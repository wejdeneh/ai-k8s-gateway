apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "ai-k8s-gateway.fullname" . }}-policy
  labels:
    {{- include "ai-k8s-gateway.labels" . | nindent 4 }}
data:
  agent_actions.rego: |
{{- if .Files.Get "agent_actions.rego" }}
{{ .Files.Get "agent_actions.rego" | indent 4 }}
{{- else }}
    # Fallback default deny policy if files are not mounted
    package agent.authz
    default allow = false
    reason = "Denied: default deny (configmap compilation fallback)."
{{- end }}
