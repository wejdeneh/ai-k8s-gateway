apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ai-k8s-gateway.fullname" . }}-secrets
  labels:
    {{- include "ai-k8s-gateway.labels" . | nindent 4 }}
type: Opaque
data:
  # Generate a cryptographically secure random 32-character key at install time 
  # if the developer fallback value is detected or if it is empty.
  {{- $val := .Values.security.jwtSecret }}
  {{- if or (empty $val) (eq $val "dev-secret-change-in-production") }}
    {{- $val = randAlphaNum 32 }}
  {{- end }}
  JWT_SECRET: {{ $val | b64enc | quote }}
