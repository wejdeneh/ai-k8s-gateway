name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  lint-and-format:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Ruff
        run: pip install ruff

      - name: Run Ruff Linter
        run: ruff check app/ demo/ tests/

      - name: Run Ruff Formatter Check
        run: ruff format --check app/ demo/ tests/

  security-scan:
    name: Security Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Bandit & Pip-Audit
        run: pip install bandit pip-audit

      - name: Scan Application Code (Bandit)
        run: bandit -r app/ -x app/tests/ -ll

      - name: Scan Dependencies (Pip-Audit)
        run: pip-audit -r requirements.txt

  opa-test:
    name: OPA Policy Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install OPA CLI
        uses: open-policy-agent/setup-opa@v2
        with:
          version: latest

      - name: Check Rego Syntax
        run: opa check policies/

      - name: Run OPA Policy Unit Tests
        # Fails if policy assertions in tests/ fail (rego tests can be written in policies/test_*)
        run: |
          if ls policies/*_test.rego 1>/dev/null 2>&1; then
            opa test policies/ -v
          else
            echo "No .rego policy test files found. Skipping OPA unit tests."
          fi

  python-tests:
    name: Python Test Suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run Pytest
        run: pytest tests/ -v --tb=short

  kubernetes-lint:
    name: Kubernetes Manifest Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Kubeconform
        run: |
          wget https://github.com/yannh/kubeconform/releases/download/v0.6.4/kubeconform-linux-amd64.tar.gz
          tar -xf kubeconform-linux-amd64.tar.gz
          sudo mv kubeconform /usr/local/bin/

      - name: Validate Gatekeeper & Gateway Manifests
        # Runs kubeconform against standard resources (Gatekeeper CRDs might fail unless schemas are fetched,
        # so we ignore custom resources and check standard deployment/configmaps/secrets/services)
        run: |
          kubeconform -summary -ignore-missing-schemas -schema-location default -schema-location "https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json" k8s/gateway/deployment.yaml

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: 'latest'

      - name: Lint Helm Chart
        run: |
          helm lint charts/ai-k8s-gateway
